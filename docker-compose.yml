services:
  postgres:
    image: postgres:16-alpine
    container_name: producerscenter-backend-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - producerscenter_backend_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U producerscenter -d producerscenter_backend"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  producerscenter_backend_pg:
